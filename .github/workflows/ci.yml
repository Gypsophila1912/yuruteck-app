name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - name: コードをチェックアウト
        uses: actions/checkout@v4

      - name: pnpm をセットアップ
        uses: pnpm/action-setup@v4
        with:
          version: latest

      - name: Node.js をセットアップ（キャッシュ付き）
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: 依存関係をインストール
        run: pnpm install --frozen-lockfile
        continue-on-error: true

      - name: Lint
        run: pnpm lint

      - name: フォーマットチェック
        run: pnpm format:check

      - name: 型チェック
        run: pnpm typecheck

      - name: ビルド
        run: pnpm build
